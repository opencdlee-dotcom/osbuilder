# OSBuilder Friendly-Error Dictionary
# ORDER MATTERS — more specific patterns must come BEFORE generic ones.
# e.g., 'slopsquat-blocked' (entry 1) before 'npm-404' (entry 2)
#       'pnpm-not-found' before 'npm-not-found'
# format_version field is REQUIRED as first record; friendly_error.py rejects anything other than "1.0"

- format_version: "1.0"
  schema_fields:
    - id
    - match_pattern
    - category
    - title
    - what_broke
    - what_to_do
    - copy_paste_command
    - phase_seen
    - expansion_note

- id: slopsquat-blocked
  match_pattern: "slopsquatting gate blocked"
  category: registry
  title: "OSBuilder blocked a suspicious package"
  what_broke: "A package name OSBuilder couldn't verify on the public registry was rejected for safety."
  what_to_do: "Check the package name for typos and re-run OSBuilder with the corrected name. If you're sure the package is real but newly published, install it manually first, then re-run."
  copy_paste_command: ~
  phase_seen: "preflight, 4"
  expansion_note: "PITFALLS.md P6 — slopsquatting prevention. The earlier copy referenced a `--allow-unverified` flag that does not exist; v1 takes the conservative path of refusing unverified packages and asking the user to install manually if they trust the source."

- id: npm-404
  match_pattern: "npm ERR! 404"
  category: registry
  title: "That package name isn't on npm"
  what_broke: "npm returned 404 — the package name does not exist on the public npm registry."
  what_to_do: "The name is likely a typo or hallucinated. OSBuilder blocked the install for safety."
  copy_paste_command: ~
  phase_seen: "2-3"
  expansion_note: "PITFALLS.md P6"

- id: pypi-404
  match_pattern: "No matching distribution found"
  category: registry
  title: "That Python package isn't on PyPI"
  what_broke: "pip returned 'No matching distribution found' — the package does not exist on PyPI."
  what_to_do: "Check the package name spelling. OSBuilder blocked the install to prevent slopsquatting."
  copy_paste_command: ~
  phase_seen: "2-3"
  expansion_note: "PITFALLS.md P6"

- id: pnpm-not-found
  match_pattern: "pnpm: command not found"
  category: preflight
  title: "pnpm isn't installed yet"
  what_broke: "The 'pnpm' command was not found on PATH."
  what_to_do: "Install pnpm globally, or let OSBuilder install it via preflight."
  copy_paste_command: "npm install -g pnpm"
  phase_seen: "preflight"
  expansion_note: "Phase 2 preflight dogfood"

- id: npm-not-found
  match_pattern: "npm: command not found"
  category: preflight
  title: "npm isn't installed yet (Node missing)"
  what_broke: "The 'npm' command was not found, which usually means Node.js is not installed."
  what_to_do: "Run preflight to install Node.js and npm."
  copy_paste_command: "python3 scripts/preflight_check.py install"
  phase_seen: "preflight"
  expansion_note: "Phase 2 preflight dogfood"

- id: python-not-found
  match_pattern: "python3: command not found"
  category: preflight
  title: "Python isn't installed yet"
  what_broke: "The 'python3' command was not found on PATH."
  what_to_do: "Run the bootstrap shim to install Python."
  copy_paste_command: "bash scripts/bootstrap.sh"
  phase_seen: "preflight"
  expansion_note: "PITFALLS.md P13"

- id: node-version-old
  match_pattern: "node version .* < 20"
  pattern_type: regex
  category: preflight
  title: "Your Node is too old"
  what_broke: "Node.js version is older than 20, which OSBuilder requires."
  what_to_do: "Run preflight to upgrade Node.js to a supported version."
  copy_paste_command: "python3 scripts/preflight_check.py install"
  phase_seen: "preflight"
  expansion_note: "Phase 2 preflight dogfood"

# IN-18: a single entry for `gh: command not found` covering both Phase 6 (ship)
# and preflight contexts. Previously two entries with the SAME match_pattern
# existed (`gh-not-installed` for Phase 6 + `gh-not-found` for preflight); the
# second was unreachable because first-match-wins. Consolidated into one entry
# with a what-to-do that addresses both audiences. If a future change needs
# context-specific copy, add a `ctx={"phase": ...}` discriminator in
# friendly_error.translate() and split this back into two entries with distinct
# match_patterns.
- id: gh-not-installed
  match_pattern: "gh: command not found"
  category: gh-auth
  title: "The GitHub CLI (`gh`) isn't installed"
  what_broke: "OSBuilder needs the `gh` command-line tool — for example, to create your private repo in Phase 6 — but it's not on PATH."
  what_to_do: "Install gh: Homebrew on macOS, winget on Windows, or run preflight to set it up automatically. On Linux, see github.com/cli/cli#installation."
  copy_paste_command: "brew install gh  # or: python3 scripts/preflight_check.py install"
  phase_seen: "preflight, 6"
  expansion_note: "Phase 6 SHIP-01; PITFALLS.md P15; pairs with gh-auth-drift"

- id: gh-token-conflict
  match_pattern: "GITHUB_TOKEN.*set.*interrupted"
  pattern_type: regex
  category: gh-auth
  title: "Two GitHub tokens are fighting"
  what_broke: "The GITHUB_TOKEN environment variable is set and interrupting interactive 'gh auth login'."
  what_to_do: "Unset the env var, then run gh auth login again."
  copy_paste_command: "unset GITHUB_TOKEN && gh auth login --git-protocol https"
  phase_seen: "preflight"
  expansion_note: "PITFALLS.md P15"

- id: gh-token-expired
  match_pattern: "HTTP 401"
  pattern_type: regex
  category: gh-auth
  title: "Your GitHub login has expired"
  what_broke: "GitHub returned HTTP 401 — your authentication token is expired or invalid."
  what_to_do: "Re-authenticate with the GitHub CLI."
  copy_paste_command: "gh auth login --git-protocol https"
  phase_seen: "2-3"
  expansion_note: "PITFALLS.md P15"

