# OSBuilder CI — QUAL-01 line-count gate + full pytest suite
# Source: assets/ci-workflows/python.yml.tmpl (extended with lint-skill-md job)
# Verified 2026-05-02: actions/checkout@v6, actions/setup-python@v6, astral-sh/setup-uv@v6
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-skill-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Lint SKILL.md line count (QUAL-01)
        run: python3 scripts/check_skill_md_length.py

  test:
    runs-on: ubuntu-latest
    needs: lint-skill-md
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run pytest
